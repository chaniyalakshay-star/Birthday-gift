<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    overflow:hidden;
    padding:20px;
}

.container{
    text-align:center;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:30px 20px;
    width:100%;
    max-width:400px;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    font-size:2rem;
    margin-bottom:10px;
}

.cake{
    font-size:80px;
    animation:bounce 1.5s infinite;
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-12px);}
}

.message{
    margin-top:15px;
    font-size:1rem;
    line-height:1.6;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4081;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

.popup{
    display:none;
    margin-top:20px;
    padding:15px;
    background:rgba(255,255,255,0.25);
    border-radius:15px;
    animation:fadeIn .8s ease;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

/* Balloons */
.balloon{
    position:absolute;
    font-size:40px;
    animation:float 8s linear infinite;
}

.balloon:nth-child(1){
    left:10%;
    animation-duration:7s;
}

.balloon:nth-child(2){
    left:80%;
    animation-duration:9s;
}

.balloon:nth-child(3){
    left:50%;
    animation-duration:8s;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-150px);
    }
}

/* Confetti */
.confetti{
    position:absolute;
    width:10px;
    height:10px;
    top:-10px;
    opacity:0.9;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

@media(max-width:480px){
    h1{
        font-size:1.7rem;
    }

    .cake{
        font-size:70px;
    }

    .message{
        font-size:0.95rem;
    }
}
</style>
</head>
<body>

<div class="balloon">🎈</div>
<div class="balloon">🎈</div>
<div class="balloon">🎈</div>

<div class="container">
    <div class="cake">🎂</div>

    <h1>Happy Birthday!</h1>

    <p class="message">
        Wishing you a day filled with happiness, laughter,
        love, and unforgettable memories. 🎉✨
    </p>

    <button onclick="showWish()">
        Open Your Surprise 🎁
    </button>

    <div class="popup" id="wishBox">
        🎊 May all your dreams come true and may this year
        bring endless success, joy, and beautiful moments.
        Happy Birthday! ❤️🎂🎉
    </div>
</div>

<script>
// Surprise Message
function showWish(){
    document.getElementById("wishBox").style.display="block";
}

// Confetti Generator
function createConfetti(){
    const confetti=document.createElement("div");
    confetti.classList.add("confetti");

    const colors=[
        "#ff0","#0ff","#f0f",
        "#fff","#00ff66",
        "#ff6600","#66ccff"
    ];

    confetti.style.left=Math.random()*100+"vw";
    confetti.style.background=
        colors[Math.floor(Math.random()*colors.length)];

    confetti.style.width=
        confetti.style.height=
        Math.random()*8+6+"px";

    confetti.style.animationDuration=
        Math.random()*3+3+"s";

    document.body.appendChild(confetti);

    setTimeout(()=>{
        confetti.remove();
    },6000);
}

setInterval(createConfetti,100);
</script>

</body>
</html>
